name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build
        run: ./gradlew build

      - name: Upload JAR
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: OpenAPI-Bifrost-jar
          path: build/libs/*.jar
          retention-days: 30
